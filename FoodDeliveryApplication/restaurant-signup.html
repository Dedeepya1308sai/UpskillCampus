<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Restaurant Signup | Foodie Hub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">Foodie Hub</a>
    <nav class="navlinks" aria-label="Primary">
      <a href="index.html">Restaurants</a>
      <a href="restaurant-login.html">Restaurant Login</a>
      <a href="restaurant-dashboard.html">Restaurant Page</a>
    </nav>
  </header>

  <main class="auth-shell restaurant-auth">
    <section class="auth-panel wide-auth">
      <div>
        <p class="eyebrow">Restaurant onboarding</p>
        <h1>List your restaurant and menu</h1>
        <p class="body-copy">Owners can publish food items with price, availability, photos, prep time, custom packaging notes, and delivery settings.</p>
      </div>
      <form class="form-card" data-auth-form="restaurant-signup">
        <div class="form-grid">
          <label>Restaurant name<input name="name" type="text" placeholder="Spice Junction" required></label>
          <label>Cuisine<input name="cuisine" type="text" placeholder="Indian, Asian, Healthy" required></label>
          <label>Owner email<input name="email" type="email" placeholder="owner@example.com" required></label>
          <label>Phone<input name="phone" type="tel" placeholder="+91 98765 43210" required></label>
          <label>Area<input name="area" type="text" placeholder="Madhapur" required></label>
          <label>Opening hours<input name="hours" type="text" placeholder="10:00 AM - 11:00 PM" required></label>
        </div>
        <label>Starter menu item<textarea name="menu" placeholder="Paneer bowl - Rs 249 - Available" required></textarea></label>
        <button type="submit">Create restaurant page</button>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>

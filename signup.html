<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>User Signup | Foodie Hub</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">Foodie Hub</a>
    <nav class="navlinks" aria-label="Primary">
      <a href="index.html">Restaurants</a>
      <a href="orders.html">Orders</a>
      <a href="cart.html">Cart <span data-cart-count>0</span></a>
      <a href="login.html">User Login</a>
    </nav>
  </header>

  <main class="auth-shell">
    <section class="auth-panel">
      <div>
        <p class="eyebrow">Customer signup</p>
        <h1>Create your delivery profile</h1>
        <p class="body-copy">Save delivery addresses, payment preferences, recent orders, and favorite restaurants for a faster checkout.</p>
      </div>
      <form class="form-card" data-auth-form="user-signup">
        <label>Full name<input name="name" type="text" placeholder="Aarav Sharma" required></label>
        <label>Email<input name="email" type="email" placeholder="you@example.com" required></label>
        <label>Phone<input name="phone" type="tel" placeholder="+91 98765 43210" required></label>
        <label>Default address<textarea name="address" placeholder="Flat, street, city" required></textarea></label>
        <label>Password<input name="password" type="password" minlength="6" required></label>
        <button type="submit">Create user account</button>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
